<style>/* ---------- Tokens ---------- */
:root {
  --bg-shell: #18181b;
  --bg-shell-2: #1f1f23;
  --bg-chat: #f6f5f1;
  --bg-card: #ffffff;
  --bg-card-soft: #fafaf7;
  --bg-bubble-bot: #ffffff;
  --bg-bubble-user: #dbeafe;
  --ink: #16161a;
  --ink-2: #3a3a40;
  --ink-3: #6a6a72;
  --ink-mute: #9a9aa3;
  --line: #e8e6df;
  --line-2: #2c2c31;
  --accent: #2563eb;
  --accent-soft: #eff6ff;
  --accent-ink: #1d4ed8;
  --vorteil: #16a34a;
  --vorteil-bg: #dcfce7;
  --gleich: #c2710c;
  --gleich-bg: #fef3c7;
  --nachteil: #dc2626;
  --nachteil-bg: #fee2e2;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px -16px rgba(0,0,0,0.18);
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --sans: "DM Sans", "Inter", system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; margin: 0; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--bg-shell);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; cursor: pointer; }

/* ---------- App layout ---------- */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg-shell);
}

.menu-btn {
  display: none;
  background: transparent;
  border: 0;
  color: #c2c2c8;
  padding: 6px;
  border-radius: 5px;
  align-items: center;
  justify-content: center;
}
.menu-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
.side-close {
  display: none;
  position: absolute;
  top: 12px;
  right: 12px;
  background: transparent;
  border: 0;
  color: #c2c2c8;
  padding: 6px;
  border-radius: 5px;
}
.side-scrim { display: none; }

.topbar {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-shell);
  border-bottom: 1px solid var(--line-2);
  color: #e9e9ec;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo { display: flex; align-items: center; gap: 8px; font-weight: 600; letter-spacing: -0.01em; }
.logo-mark {
  width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 4px;
  position: relative;
}
.logo-mark::after {
  content: "";
  position: absolute;
  inset: 4px;
  background: var(--bg-shell);
  border-radius: 1px;
}
.logo-text { font-size: 14px; }
.topbar-divider { width: 1px; height: 18px; background: var(--line-2); }
.topbar-title { font-size: 13px; color: #c2c2c8; }
.badge-internal {
  font-size: 10px;
  font-family: var(--mono);
  background: rgba(255,255,255,0.06);
  color: #d8d8de;
  padding: 3px 7px;
  border-radius: 3px;
  letter-spacing: 0.08em;
}
.topbar-right { display: flex; align-items: center; gap: 6px; }
.icon-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 0; color: #c2c2c8;
  padding: 6px 10px; border-radius: 5px; font-size: 12.5px;
}
.icon-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
.user-tag {
  margin-left: 8px;
  background: rgba(255,255,255,0.06);
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
  color: #d8d8de;
  font-family: var(--mono);
}

.layout {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ---------- Sidebar ---------- */
.sidebar {
  background: var(--bg-shell);
  border-right: 1px solid var(--line-2);
  padding: 18px 16px 16px;
  color: #c8c8cf;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}
.side-h {
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #7c7c84;
  font-family: var(--mono);
  margin: 14px 4px 4px;
}
.side-h:first-child { margin-top: 0; }
.side-card {
  background: var(--bg-shell-2);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.side-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; padding: 3px 0; }
.side-k { color: #7c7c84; font-family: var(--mono); font-size: 11px; }
.side-v { color: #e6e6ec; text-align: right; max-width: 60%; }
.status-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  margin-right: 6px; vertical-align: middle;
}
.status-dot.wip { background: oklch(0.78 0.15 80); }
.status-dot.ok { background: oklch(0.7 0.16 145); }

.side-steps {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 1px;
}
.side-step {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 8px;
  border-radius: 5px;
  font-size: 12.5px;
  color: #6a6a72;
}
.side-step-num { font-family: var(--mono); font-size: 10.5px; color: #57575e; min-width: 18px; }
.side-step.reached { color: #c8c8cf; }
.side-step.reached .side-step-num { color: var(--accent); }
.side-step.current {
  background: rgba(255,255,255,0.04);
  color: #fff;
}
.side-step.current .side-step-num { color: var(--accent); }

.side-foot { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line-2); }
.side-prep-btn {
  width: 100%;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--accent);
  color: #fff;
  border: 0;
  padding: 10px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.005em;
}
.side-prep-btn:disabled { background: rgba(255,255,255,0.06); color: #57575e; cursor: not-allowed; }
.side-prep-btn:not(:disabled):hover { filter: brightness(1.08); }

/* ---------- Chat area ---------- */
.chat {
  background: var(--bg-chat);
  overflow-y: auto;
  padding: 28px 28px 140px;
  position: relative;
  flex: 1;
  width: 100%;
}
.chat-inner { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.msg-row.msg-user { flex-direction: row-reverse; }
.avatar {
  width: 28px; height: 28px;
  background: var(--ink);
  color: #fff;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.avatar-user {
  background: var(--accent);
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.msg-stack { display: flex; flex-direction: column; gap: 4px; max-width: 92%; }
.msg-user .msg-stack { align-items: flex-end; }
.bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--ink);
}
.bubble-bot {
  background: var(--bg-bubble-bot);
  border: 1px solid var(--line);
  border-top-left-radius: 4px;
}
.bubble-user {
  background: var(--bg-bubble-user);
  color: #1e3a8a;
  border-top-right-radius: 4px;
}
.msg-time { font-size: 10.5px; color: var(--ink-mute); font-family: var(--mono); padding: 0 4px; }

.user-summary { display: flex; flex-direction: column; gap: 8px; }
.us-text { font-size: 13.5px; line-height: 1.5; }
.us-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.us-tag {
  font-family: var(--mono);
  font-size: 10.5px;
  background: rgba(30,64,175,0.12);
  color: #1e40af;
  padding: 3px 7px;
  border-radius: 3px;
  letter-spacing: 0.04em;
}

/* When card is direct child, drop bubble paddings */
.bubble-bot:has(.card),
.bubble-bot:has(.welcome) {
  padding: 0;
  background: transparent;
  border: 0;
  border-radius: 0;
}

/* ---------- Cards ---------- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 660px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.card-h {
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.card-actions { display: flex; gap: 8px; margin-top: 4px; }
.card-actions.row { flex-direction: row; }

/* Welcome */
.welcome { padding: 26px 26px 22px; gap: 12px; }
.welcome-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
  display: inline-flex; align-items: center; gap: 7px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.welcome-title {
  font-size: 26px;
  letter-spacing: -0.02em;
  margin: 4px 0 0;
  font-weight: 600;
}
.welcome-sub { color: var(--ink-2); font-size: 14px; margin: 0; max-width: 56ch; }
.welcome-actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.welcome-meta {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 0;
  margin-top: 10px;
  border-top: 1px solid var(--line);
  padding-top: 14px;
}
.welcome-meta > div { display: flex; flex-direction: column; gap: 2px; }
.welcome-meta .k { font-family: var(--mono); font-size: 18px; color: var(--ink); letter-spacing: -0.02em; }
.welcome-meta .v { font-size: 11.5px; color: var(--ink-3); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 14px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.005em;
  transition: all 0.12s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover:not(:disabled) { filter: brightness(1.08); }
.btn-primary:disabled { background: var(--line); color: var(--ink-mute); cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border-color: var(--line);
}
.btn-ghost:hover { background: var(--bg-card-soft); }
.btn-full { width: 100%; justify-content: center; padding: 11px; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Chips */
.chip-group { display: flex; flex-direction: column; gap: 6px; }
.chip-label { font-size: 11px; font-family: var(--mono); color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  background: #fff;
  border: 1px solid var(--line);
  padding: 6px 11px;
  border-radius: 16px;
  font-size: 12.5px;
  color: var(--ink-2);
  transition: all 0.1s;
}
.chip:hover { border-color: var(--ink-3); }
.chip-active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.chip-active:hover { border-color: var(--ink); }
.muted { color: var(--ink-mute); }
.small { font-size: 12px; }
.mb { margin-bottom: 6px; }

.textarea {
  width: 100%;
  background: var(--bg-card-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 11px 13px;
  font-family: var(--sans);
  font-size: 13.5px;
  color: var(--ink);
  resize: vertical;
  outline: none;
  transition: border-color 0.1s;
}
.textarea:focus { border-color: var(--ink-2); }

/* Upload */
.drop {
  border: 1.5px dashed var(--line);
  border-radius: 10px;
  padding: 30px 16px;
  text-align: center;
  background: var(--bg-card-soft);
  color: var(--ink-3);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.drop:hover, .drop-active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
.drop-busy { cursor: wait; border-style: solid; border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
.drop-title { font-size: 13.5px; font-weight: 500; color: var(--ink); margin-top: 4px; }
.drop-busy .drop-title { color: var(--accent-ink); }
.drop-sub { font-size: 11.5px; font-family: var(--mono); }

.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.spinner-sm { width: 13px; height: 13px; border-width: 1.5px; }
@keyframes spin { to { transform: rotate(360deg); } }

.file-pill {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-card-soft);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
}
.file-meta { flex: 1; }
.file-name { font-size: 13px; font-weight: 500; }
.file-sub { font-size: 11px; color: var(--ink-3); font-family: var(--mono); }
.file-check { color: oklch(0.6 0.16 145); }

/* Detected */
.detected { display: flex; align-items: center; gap: 12px; }
.detected-logo {
  width: 36px; height: 36px;
  background: var(--ink);
  color: #fff;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 16px; font-weight: 600;
}
.detected-name { font-size: 14px; }
.detected-sub { font-size: 12px; color: var(--ink-3); }
.select-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.select-pill {
  display: flex; align-items: center; gap: 7px;
  background: #fff;
  border: 1px solid var(--line);
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 12.5px;
  color: var(--ink);
}
.select-pill-active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
.select-logo {
  width: 20px; height: 20px;
  background: var(--ink);
  color: #fff;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
}
.select-pill-active .select-logo { background: var(--accent); }

/* Analyse */
.analyse-row { display: flex; gap: 8px; }
.analyse-meta { display: flex; flex-wrap: wrap; gap: 6px; }
.meta-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--bg-card-soft);
  border: 1px solid var(--line);
  padding: 5px 9px;
  border-radius: 4px;
  font-size: 11.5px;
  color: var(--ink-2);
  font-family: var(--mono);
}
.progress { display: flex; flex-direction: column; gap: 10px; }
.progress-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-2); font-family: var(--mono); }
.progress-bar {
  width: 100%; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  width: 0; height: 100%; background: var(--accent);
  animation: progFill 3.2s ease-out forwards;
}
@keyframes progFill { to { width: 100%; } }
.progress-steps { display: flex; gap: 14px; font-size: 11px; font-family: var(--mono); color: var(--ink-mute); flex-wrap: wrap; }
.ps { position: relative; padding-left: 12px; }
.ps::before { content: "○"; position: absolute; left: 0; }
.ps-done { color: var(--ink-2); }
.ps-done::before { content: "●"; color: oklch(0.6 0.16 145); }
.ps-active { color: var(--accent); }
.ps-active::before { content: "●"; color: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Result cards */
.card-result, .card-table, .card-prep {
  border-color: var(--line);
}
.result-h { display: flex; flex-direction: column; gap: 2px; padding-bottom: 4px; border-bottom: 1px solid var(--line); }
.result-h-eyebrow { font-size: 10.5px; font-family: var(--mono); color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; }
.result-h-title { font-size: 16px; font-weight: 600; letter-spacing: -0.015em; color: var(--ink); }

/* Advantages */
.adv-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 9px; }
.adv-item { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--ink-2); }
.adv-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--vorteil);
  color: #fff;
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  padding: 3px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  font-weight: 600;
  margin-top: 1px;
}
.adv-text { line-height: 1.5; flex: 1; }

/* Table */
.tbl { display: flex; flex-direction: column; }
.tbl-head, .tbl-row {
  display: grid;
  grid-template-columns: 1.4fr 1.4fr 1.4fr 0.7fr;
  gap: 12px;
  padding: 9px 4px;
  align-items: start;
  font-size: 12.5px;
}
.tbl-head {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--line);
}
.tbl-row { border-bottom: 1px dashed var(--line); }
.tbl-row:last-child { border-bottom: 0; }
.tbl-baustein { font-weight: 500; color: var(--ink); }
.tbl-cell.mono { font-family: var(--mono); font-size: 11.5px; color: var(--ink-2); line-height: 1.5; }
.rating {
  display: inline-block;
  font-size: 10.5px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  padding: 3px 7px;
  border-radius: 3px;
  font-weight: 600;
  white-space: nowrap;
}
.rating-vorteil { background: var(--vorteil-bg); color: var(--vorteil); }
.rating-gleich { background: var(--gleich-bg); color: var(--gleich); }
.rating-nachteil { background: var(--nachteil-bg); color: var(--nachteil); }
.more-toggle {
  margin-top: 6px;
  background: transparent;
  border: 1px dashed var(--line);
  color: var(--ink-2);
  padding: 7px 10px;
  border-radius: 5px;
  font-size: 12px;
  display: inline-flex; align-items: center; gap: 5px;
  align-self: flex-start;
}
.more-toggle:hover { border-color: var(--ink-3); border-style: solid; }

/* Prep */
.card-prep { background: var(--ink); color: #f6f5f1; border-color: var(--ink); }
.prep-h {
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  display: inline-flex; align-items: center; gap: 7px;
}
.prep-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
.prep-item { display: flex; gap: 14px; align-items: flex-start; }
.prep-num { font-family: var(--mono); font-size: 11px; color: var(--accent); padding-top: 3px; min-width: 18px; }
.prep-text { font-size: 14px; line-height: 1.55; color: #f6f5f1; font-weight: 500; letter-spacing: -0.005em; }

/* Prose */
.card-prose { background: #f9f9fb; }
.prose-body { display: flex; flex-direction: column; gap: 10px; }
.prose-body p { margin: 0; font-size: 13.5px; line-height: 1.65; color: var(--ink-2); }

/* Table footer row */
.tbl-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; }

/* Deep dive */
.card-deepdive { border-left: 3px solid var(--accent); }
.deepdive-h {
  font-size: 11px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--accent); display: inline-flex; align-items: center; gap: 7px; margin-bottom: 10px;
}

/* Deep dive selector */
.card-deepselect {}
.deepselect-grid { display: flex; flex-direction: column; gap: 8px; }
.deepselect-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: #fff;
  font-size: 13.5px; font-weight: 500; color: var(--ink);
  cursor: pointer; text-align: left; transition: border-color .15s, background .15s;
}
.deepselect-pill:hover { border-color: var(--ink-3); background: #f9f9fb; }
.deepselect-pill.deepselect-done { border-color: #16a34a; background: #f0fdf4; color: #166534; cursor: default; }

/* More area row */
.more-area-row { padding: 4px 0 8px 48px; }

/* AVB version display */
.avb-section { display: flex; flex-direction: column; gap: 8px; padding-top: 12px; border-top: 1px solid var(--line); }
.avb-section-label { font-size: 10.5px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); }
.avb-row { display: flex; align-items: flex-start; gap: 10px; }
.avb-info { display: flex; flex-direction: column; gap: 4px; }
.avb-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.avb-date { font-size: 11px; color: var(--ink-3); font-family: var(--mono); }
.avb-status {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-family: var(--mono); letter-spacing: 0.04em;
  padding: 2px 7px; border-radius: 3px; font-weight: 600; align-self: flex-start;
}
.avb-current  { background: var(--vorteil-bg); color: var(--vorteil); }
.avb-newer    { background: var(--gleich-bg);   color: var(--gleich); }
.avb-outdated { background: var(--nachteil-bg); color: var(--nachteil); }
.avb-unknown  { background: var(--nachteil-bg); color: var(--nachteil); }
.avb-hint { font-size: 11px; color: var(--gleich); font-family: var(--mono); }

/* Table AVB source line */
.tbl-source {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  font-size: 11px; font-family: var(--mono); color: var(--ink-3);
  padding: 6px 4px 10px; border-bottom: 1px solid var(--line);
}
.tbl-source-sep { margin: 0 2px; color: var(--line); }

/* QA answer */
.qa-answer { display: flex; flex-direction: column; gap: 6px; }
.qa-answer p { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--ink-2); }
.qa-answer p:empty { display: none; }
.qa-answer b { color: var(--ink); }

/* QA answer */
.qa-answer { display: flex; flex-direction: column; gap: 6px; }
.qa-answer p { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--ink-2); }
.qa-answer p:empty { display: none; }
.qa-answer b { color: var(--ink); }

/* Disclaimer */
.disclaimer {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 11.5px;
  color: var(--ink-3);
  font-family: var(--mono);
  background: var(--bg-card-soft);
  border: 1px solid var(--line);
  padding: 7px 11px;
  border-radius: 5px;
  align-self: flex-start;
}

/* Composer */
.composer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to bottom, transparent, var(--bg-chat) 30%);
  padding: 32px 28px 18px;
  pointer-events: none;
}
.composer-inner { max-width: 760px; margin: 0 auto; pointer-events: auto; display: flex; flex-direction: column; gap: 8px; }
.qa-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.qa-chip-label { font-size: 11px; font-family: var(--mono); color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; margin-right: 4px; }
.qa-chip {
  background: #fff;
  border: 1px solid var(--line);
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 12px;
  color: var(--ink-2);
}
.qa-chip:hover { border-color: var(--ink-3); color: var(--ink); }

.qa-form {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 6px 6px 6px 12px;
  box-shadow: 0 4px 16px -8px rgba(0,0,0,0.1);
}
.qa-form:focus-within { border-color: var(--ink-3); }
.qa-icon { color: var(--ink-3); margin-right: 8px; flex-shrink: 0; }
.qa-input {
  flex: 1;
  border: 0;
  outline: none;
  background: transparent;
  font-family: var(--sans);
  font-size: 13.5px;
  color: var(--ink);
  padding: 6px 0;
}
.qa-input::placeholder { color: var(--ink-mute); }
.qa-send {
  width: 30px; height: 30px;
  background: var(--accent);
  color: #fff;
  border: 0;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.qa-send:disabled { background: var(--line); color: var(--ink-mute); cursor: not-allowed; }
.qa-send:not(:disabled):hover { filter: brightness(1.08); }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar */
.chat::-webkit-scrollbar, .sidebar::-webkit-scrollbar { width: 8px; }
.chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

/* ---------- Tablet (≤ 1024px) ---------- */
@media (max-width: 1024px) {
  .layout { grid-template-columns: 220px 1fr; }
  .composer { left: 220px; }
  .chat { padding: 22px 20px 140px; }
  .topbar-title { display: none; }
  .icon-btn span, .icon-btn { font-size: 12px; }
  .welcome-title { font-size: 22px; }
}

/* ---------- Mobile (≤ 768px) ---------- */
@media (max-width: 768px) {
  body { font-size: 13.5px; }

  .menu-btn { display: inline-flex; }
  .side-close { display: inline-flex; }

  /* Topbar slim */
  .topbar { height: 48px; padding: 0 12px; }
  .topbar-divider { display: none; }
  .topbar-title { display: none; }
  .badge-internal { display: none; }
  .topbar-right .icon-btn { display: none; }
  .user-tag { padding: 4px 8px; font-size: 11px; margin-left: 0; }
  .logo-text { font-size: 13px; }

  /* Layout becomes single column; sidebar slides in */
  .layout { grid-template-columns: 1fr; position: relative; }
  .sidebar {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    width: 86%;
    max-width: 320px;
    z-index: 50;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    padding: 48px 14px 14px;
    border-right: 1px solid var(--line-2);
    box-shadow: 8px 0 30px -10px rgba(0,0,0,0.5);
  }
  .sidebar-open { transform: translateX(0); }
  .side-scrim {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    animation: fadeUp 0.2s ease;
  }
  body:has(.sidebar-open) { overflow: hidden; }

  /* Chat */
  .chat { padding: 16px 14px 180px; }
  .chat-inner { gap: 14px; }
  .msg-stack { max-width: 100%; }
  .bubble { padding: 9px 12px; font-size: 13px; }
  .avatar { width: 24px; height: 24px; }

  /* Cards full width */
  .card { padding: 14px 14px; gap: 12px; border-radius: 10px; }
  .welcome { padding: 18px 16px 16px; }
  .welcome-title { font-size: 20px; line-height: 1.2; }
  .welcome-sub { font-size: 13px; }
  .welcome-actions { flex-direction: column; align-items: stretch; }
  .welcome-actions .btn { justify-content: center; }
  .welcome-meta { grid-template-columns: 1fr; gap: 10px; }
  .welcome-meta > div { flex-direction: row; align-items: baseline; gap: 8px; }
  .welcome-meta .k { font-size: 16px; min-width: 56px; }

  /* Card actions stack */
  .card-actions, .card-actions.row { flex-direction: column; align-items: stretch; }
  .card-actions .btn { justify-content: center; width: 100%; }

  /* Detected dropdown */
  .select-grid { grid-template-columns: repeat(2, 1fr); }

  /* Analyse meta wraps */
  .analyse-meta { gap: 4px; }
  .meta-pill { font-size: 11px; padding: 4px 7px; }
  .progress-steps { flex-direction: column; gap: 5px; }

  /* Table → stacked card layout */
  .tbl-head { display: none; }
  .tbl { gap: 0; }
  .tbl-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .tbl-baustein {
    grid-column: 1 / 2;
    grid-row: 1;
    font-size: 13px;
  }
  .tbl-row > div:nth-child(4) {
    grid-column: 2 / 3;
    grid-row: 1;
    justify-self: end;
  }
  .tbl-cell.mono {
    grid-column: 1 / 3;
    font-size: 11.5px;
    line-height: 1.5;
    padding-left: 0;
    position: relative;
    padding-top: 2px;
  }
  .tbl-cell.mono::before {
    content: attr(data-label);
  }
  /* tbl-row children: 1=baustein, 2=wir, 3=konk, 4=rating */
  .tbl-row > .tbl-cell.mono:nth-child(2)::before { content: "WIR · "; color: var(--accent); font-weight: 600; letter-spacing: 0.04em; }
  .tbl-row > .tbl-cell.mono:nth-child(3)::before { content: "KONK · "; color: var(--ink-3); font-weight: 600; letter-spacing: 0.04em; }

  /* Drop zone smaller */
